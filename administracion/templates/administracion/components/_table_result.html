{% load crud_tags %}

{% for obj in object_list %}
<tr>
    {% for column in table_columns %}
    <td>{{ obj|get_attr:column.name }}</td>
    {% endfor %}
    <td class="text-end">
        <a href="#" class="btn btn-primary btn-sm btn-edit" 
           data-bs-toggle="tooltip" title="Editar"
           data-id="{{ obj.pk }}"
           {% for column in table_columns %}
           {% if column.is_boolean %}
           data-{{ column.name }}="{{ obj|get_attr_raw:column.name|lower }}"
           {% else %}
           data-{{ column.name }}="{{ obj|get_attr:column.name }}"
           {% endif %}
           {% endfor %}>
            <i class="fa fa-edit"></i>
        </a>
        <form method="post" action="{{ list_url }}" class="d-inline">
            {% csrf_token %}
            <input type="hidden" name="pk" value="{{ obj.pk }}">
            <input type="hidden" name="action" value="delete">
            <button type="submit" class="btn btn-danger btn-sm" 
                    data-bs-toggle="tooltip" title="Eliminar"
                    onclick="return confirm('¿Está seguro de que desea desactivar este registro?')">
                <i class="fa fa-times"></i>
            </button>
        </form>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="{{ table_columns|length|add:1 }}" class="text-center">No se encontraron registros.</td>
</tr>
{% endfor %}
